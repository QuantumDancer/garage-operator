              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of GarageKey
            properties:
              clusterRef:
                description: clusterRef selects the GarageCluster the key belongs
                  to.
                properties:
                  name:
                    description: name is the referenced GarageCluster's name.
                    type: string
                  namespace:
                    description: |-
                      namespace is the referenced GarageCluster's namespace; defaults to the referencing
                      object's own namespace when omitted.
                    type: string
                required:
                - name
                type: object
              deletionPolicy:
                default: Delete
                description: |-
                  deletionPolicy controls whether the Garage key is deleted with the CR. The default is
                  Delete; set Retain to leave the key and its Secret in place when the CR is deleted.
                enum:
                - Retain
                - Delete
                type: string
              expiration:
                description: expiration is when the key stops working (RFC 3339).
                  Omitted means the key never expires.
                format: date-time
                type: string
              import:
                description: import adopts an existing key instead of generating one.
                properties:
                  accessKeyIdKey:
                    description: accessKeyIdKey is the Secret data key holding the
                      access key id; defaults to accessKeyId.
                    type: string
                  secretAccessKeyKey:
                    description: secretAccessKeyKey is the Secret data key holding
                      the secret key; defaults to secretAccessKey.
                    type: string
                  secretName:
                    description: secretName is the Secret holding the credentials
                      to import.
                    type: string
