                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              credentialsSecret:
                description: credentialsSecret is the Secret the access credentials
                  were written to.
                type: string
              expiration:
                description: expiration mirrors GetKeyInfo; absent when the key never
                  expires.
                format: date-time
                type: string
              expired:
                description: expired mirrors GetKeyInfo.expired.
                type: boolean
              keyId:
                description: keyId is the Garage access key id the CR is bound to.
                type: string
              observedGeneration:
                description: observedGeneration is the generation most recently reconciled
                  into status.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
