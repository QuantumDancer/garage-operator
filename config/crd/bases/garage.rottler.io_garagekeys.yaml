              permissions:
                description: permissions are the key's global capabilities.
                properties:
                  createBucket:
                    description: createBucket lets the key create new buckets on its
                      own (Garage KeyPerm.createBucket).
                    type: boolean
                type: object
              renewBefore:
                description: |-
                  renewBefore asks the operator to rotate the key this long before expiration. Reconciled
