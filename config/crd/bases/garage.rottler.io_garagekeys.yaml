  group: garage.rottler.io
  names:
    kind: GarageKey
    listKind: GarageKeyList
    plural: garagekeys
    singular: garagekey
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
