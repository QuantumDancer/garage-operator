apiVersion: garage.rottler.io/v1alpha1
kind: GarageBucket
metadata:
  labels:
    app.kubernetes.io/name: garage-operator
    app.kubernetes.io/managed-by: kustomize
  name: garagebucket-sample
spec:
  clusterRef:
    name: garagecluster-sample
  globalAliases:
    - photos
  website:
    enabled: true
    indexDocument: index.html
    errorDocument: error.html
  quotas:
    maxSize: 50Gi
    maxObjects: 100000
  cors:
    - id: allow-web
      allowedOrigins: ["*"]
      allowedMethods: [GET, HEAD]
      allowedHeaders: ["*"]
      maxAgeSeconds: 3600
  lifecycle:
    - id: expire-tmp
      status: Enabled
      filter:
        prefix: tmp/
      expiration:
        days: 30
      abortIncompleteMultipartUpload:
        daysAfterInitiation: 7
  deletionPolicy: Delete # Delete (default): deleting the CR deletes the bucket (refused while non-empty). Retain leaves it.
