name: Release

# Cut a release by pushing a SemVer tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
# This builds and pushes the multi-arch operator image to ghcr, signs it (keyless cosign)
# with SBOM + provenance attestations, packages the Helm chart stamped to the same version,
# and creates a GitHub Release with the chart archive attached.
on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

env:
  IMAGE: ghcr.io/quantumdancer/garage-operator

jobs:
  release:
    name: Build, sign, and release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release and upload the chart archive
      packages: write # push the image + its SBOM/provenance attestations to ghcr
      id-token: write # cosign keyless signing (OIDC)
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # The tag is the single source of truth for the version; strip the leading "v"
      # so it can stamp both the image tag (via Chart.appVersion) and the chart version.
      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # latest=auto: only stable (non-prerelease) tags also move the `latest` tag.
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Sign by immutable digest, which covers every tag (version, major.minor, latest)
      # that resolves to it — one signature instead of one per tag.
      - name: Sign the image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      # --app-version stamps the operator image tag the chart pins to (values leaves
      # image.tag unset, so the manager template defaults it to Chart.appVersion).
      - name: Package the Helm chart
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist/releases
          helm package dist/chart \
            --version "${VERSION}" \
            --app-version "${VERSION}" \
            --destination dist/releases

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
          files: dist/releases/*.tgz
