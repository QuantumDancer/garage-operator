name: Generated code

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  verify:
    permissions:
      contents: read
    name: Verify generated artifacts are up to date
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      # The Helm chart (dist/chart) is regenerated by the kubebuilder CLI, not `make
      # manifests`. The helm-chart target downloads the pinned kubebuilder into bin/, so the
      # CLI version matches local runs and the drift check stays reproducible.
      - name: Regenerate manifests, deepcopy, Admin API client, and Helm chart
        run: make manifests generate generate-client helm-chart

      - name: Fail if anything is stale
        run: git diff --exit-code
