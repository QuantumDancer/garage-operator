name: Build Image

# Build the multi-arch operator image on every PR (and push to main) WITHOUT pushing it.
# amd64-only is already exercised by `make docker-build` in the e2e and chart jobs; the gap
# this closes is the linux/arm64 cross-compile path, which otherwise only runs at release
# time (and regressed in v0.1.0-rc.1). No QEMU: the Dockerfile cross-compiles and the runtime
# stage only COPYs the binary, so no emulation is needed.
on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  build-image:
    permissions:
      contents: read
    # Unique bare job name -> status-check context "Image Build" for the branch ruleset.
    name: Image Build
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build multi-arch image (no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
