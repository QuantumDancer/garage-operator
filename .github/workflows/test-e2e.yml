name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  test-e2e:
    permissions:
      contents: read
    # Shard the suite across parallel jobs, each on its own runner with its own
    # Kind cluster. The specs are isolated by namespace, so the only constraint is
    # keeping the manager+metrics specs together (shared "manager" label). The four
    # shards are balanced so the heavy cluster-lifecycle specs are spread out:
    #   light (manager+metrics plus the light bucket/key/maintenance specs),
    #   cluster (the 3-node bring-up plus the StorageClass-change migration),
    #   drain (plus the two-pool multi-zone bring-up), and the two data-size
    #   storage migrations (grow + shrink).
    # fail-fast: false so one shard failing does not cancel the others — we want the
    # full picture on every run. The label filters mirror the Labels in
    # test/e2e/e2e_test.go; keep the two in sync.
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: light
            filter: "manager || bucket || key || maintenance || validation"
          - shard: cluster
            filter: "cluster || class"
          - shard: drain
            filter: "drain || multizone"
          - shard: storage
            filter: "grow || shrink"
    # The job name (and therefore the status-check context) is "E2E <shard>", a
    # unique bare name per shard. The branch ruleset's required checks must list
    # each of these, not the old single "E2E Tests" context.
    name: E2E ${{ matrix.shard }}
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Install the latest version of kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Running Test e2e
        run: |
          go mod tidy
          make test-e2e E2E_LABEL_FILTER='${{ matrix.filter }}'
